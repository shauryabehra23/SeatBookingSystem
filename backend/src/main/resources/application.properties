spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/seatbooking}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# Hibernate config
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Run schema.sql and data.sql on startup
spring.sql.init.mode=always
spring.sql.init.platform=postgres

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# JWT — use a long random string in production, this is fine for demo
app.jwt.secret=RICJaipurSeatBookingPortalSuperSecretKeyForJWTGeneration2026Demo
app.jwt.expiration-ms=86400000

# Frontend URL for CORS
app.frontend.url=http://localhost:3000
